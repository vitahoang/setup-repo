name: {{WORKFLOW_NAME}}

# Shared template — copy into a target repo's .github/workflows/ and replace every
# {{TOKEN}}. A cloud Claude routine can only push to `claude/` branches and has no
# GitHub API access, so it cannot open a PR itself. This workflow fires when the
# routine pushes its branch and opens (or reuses) a PR into the default branch, using
# the tip commit's body as the PR description.

on:
  push:
    branches:
      - '{{BRANCH_GLOB}}'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: {{CONCURRENCY_PREFIX}}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  open-pr:
    if: ${{ github.event.deleted != true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Open or reuse a PR for the routine's branch
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          # Fallback PR body, passed via env so backticks / $ in it stay literal:
          # referencing "$DEFAULT_BODY" in double quotes never re-expands its contents.
          DEFAULT_BODY: |
            {{DEFAULT_BODY}}
        run: |
          set -euo pipefail

          base=$(gh repo view "$REPO" --json defaultBranchRef --jq .defaultBranchRef.name)

          # Reuse an existing open PR for this branch if there is one.
          existing=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $BRANCH."
            exit 0
          fi

          # Use the tip commit body as the PR description (the routine writes its
          # report there); fall back to DEFAULT_BODY if it is empty.
          body=$(git log -1 --format=%b "origin/$BRANCH")
          if [ -z "$body" ]; then
            body="$DEFAULT_BODY"
          fi

          gh pr create --repo "$REPO" --base "$base" --head "$BRANCH" \
            --title "{{PR_TITLE}}" \
            --body "$body"
